# Ultralytics ByteTrack Tracker Configuration
# Optimization for People Counting: Higher track_buffer for occlusion handling.

tracker_type: bytetrack
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.6
track_buffer: 120    # Increased from default for better persistence
match_thresh: 0.8
fuse_score: True
